<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#43a047"/>
      <stop offset="100%" stop-color="#1b5e20"/>
    </linearGradient>
    <linearGradient id="drop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.25)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.08)"/>
    </linearGradient>
  </defs>
  <!-- 角丸背景 -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <!-- 水滴シルエット（背景に薄く） -->
  <path d="M256 80 C256 80 148 220 148 310 C148 370 196 420 256 420 C316 420 364 370 364 310 C364 220 256 80 256 80Z" fill="url(#drop)"/>
  <!-- 濃度グラデーション（水滴下部） -->
  <clipPath id="dropClip">
    <path d="M256 80 C256 80 148 220 148 310 C148 370 196 420 256 420 C316 420 364 370 364 310 C364 220 256 80 256 80Z"/>
  </clipPath>
  <rect x="148" y="340" width="216" height="80" fill="rgba(255,255,255,0.12)" clip-path="url(#dropClip)"/>
  <rect x="148" y="370" width="216" height="50" fill="rgba(255,255,255,0.08)" clip-path="url(#dropClip)"/>
  <!-- N 文字 -->
  <text x="256" y="310" text-anchor="middle" font-family="'Helvetica Neue','Arial',sans-serif" font-weight="800" font-size="200" fill="#fff" letter-spacing="-8">N</text>
  <!-- ppm ラベル -->
  <text x="256" y="380" text-anchor="middle" font-family="'Helvetica Neue','Arial',sans-serif" font-weight="600" font-size="56" fill="rgba(255,255,255,0.7)" letter-spacing="4">ppm</text>
</svg>
